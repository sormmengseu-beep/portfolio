title: About Me
description: Learn more about my journey as a web developer who loves coding and creating video games for YouTube.
content: |
  Hi, I'm **Meng Seu**, a web developer passionate about coding and crafting video games for my YouTube channel. Over the years, I've combined my love for technology and creativity to build engaging digital experiences and share my journey with others.

  ### My Journey

  My path began with a fascination for how things work, leading me to explore both web development and game design. I enjoy the challenge of solving problems through code and bringing ideas to life, whether it's a sleek website or an interactive game.

  ### My Passion

  I believe in the power of storytelling through technology. Creating video games allows me to merge design, development, and narrative into a cohesive experience. Sharing these creations on YouTube has been an incredible way to connect with others who share similar interests.

  ### Beyond Development

  When I'm not coding or designing, I enjoy brainstorming new game ideas, exploring the latest tech trends, and engaging with my YouTube community. It's all about learning, growing, and inspiring others along the way.

  Thanks for visiting! Feel free to check out my [projects](/projects) or [get in touch](/#contact) if you'd like to collaborate or chat about web development and game design!
